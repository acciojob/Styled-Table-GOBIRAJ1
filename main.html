<!DOCTYPE html>
<html lang="en">
<head>
    <title>Styled Table</title>
    <style>

        table {
            width: 100%;
            border-collapse: collapse;
            box-shadow: 0 4px 10px rgba(1,0,0,0.2);
            background-color: white;
        }

        thead {
            background-color: #2c3e50;
            color: white;
        }

        th, td {
            padding: 12px;
            text-align: center;
            border: 1px solid #ddd;
        }

        th {
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        tbody tr:nth-child(even) {
            background-color: #f2f2f2;
        }

        tbody tr:hover {
            background-color: #d6eaf8;
            cursor: pointer;
        }

        caption {
            caption-side: top;
            font-size: 24px;
            font-weight: bold;
            margin: 10px;
            color: #2c3e50;
        }
    </style>
</head>
<body>

<table>
    <caption>CBSE Result Sheet</caption>

    <!-- Table Head -->
    <thead>
        <tr>
            <th>Subject</th>
            <th>Marks Obtained</th>
            <th>Maximum Marks</th>
            <th>Grade</th>
        </tr>
    </thead>

    <!-- Table Body -->
    <tbody>
        <tr>
            <td>Mathematics</td>
            <td>95</td>
            <td>100</td>
            <td>A1</td>
        </tr>
        <tr>
            <td>Science</td>
            <td>88</td>
            <td>100</td>
            <td>A2</td>
        </tr>
        <tr>
            <td>English</td>
            <td>92</td>
            <td>100</td>
            <td>A1</td>
        </tr>
        <tr>
            <td>Social Science</td>
            <td>85</td>
            <td>100</td>
            <td>A2</td>
        </tr>
        <tr>
            <td>Computer</td>
            <td>98</td>
            <td>100</td>
            <td>A1</td>
        </tr>
    </tbody>
</table>

</body>
</html>
